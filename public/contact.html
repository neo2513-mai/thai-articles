<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ติดต่อเรา - คลังบทความ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    body { background-color: #f8f9fa; font-family: 'Tahoma', sans-serif; }
    .contact-card {
      border: none;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .contact-header {
      background: linear-gradient(135deg, #ff69b4, #ff1493);
      color: white;
      padding: 40px 20px;
      text-align: center;
    }
    .qr-code {
      width: 200px;
      height: 200px;
      border: 5px solid white;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .btn-contact {
      border-radius: 10px;
      padding: 12px;
      font-weight: bold;
      margin-bottom: 10px;
      transition: all 0.3s;
    }
    .btn-line { background-color: #06c755; color: white; }
    .btn-line:hover { background-color: #05a346; color: white; transform: translateY(-2px); }
    .btn-messenger { background-color: #0084ff; color: white; }
    .btn-messenger:hover { background-color: #0066cc; color: white; transform: translateY(-2px); }
    .btn-fb { background-color: #1877f2; color: white; }
    .btn-fb:hover { background-color: #145dbf; color: white; transform: translateY(-2px); }
  </style>
</head>
<body>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      
      <div class="card contact-card">
        <div class="contact-header">
          <i class="bi bi-person-lines-fill" style="font-size: 3rem;"></i>
          <h2 class="mt-3">ติดต่อเรา</h2>
          <p>ยินดีให้คำปรึกษาและสอบถามข้อมูล</p>
        </div>
        
        <div class="card-body p-4 text-center">
          <div class="mb-4">
            <p class="text-muted mb-2">สแกนเพื่อเพิ่มเพื่อนใน LINE</p>
            <img src="/public/qr code line1.png">
          </div>

          <hr>

          <div class="d-grid gap-2">
            <a href="tel:0812345678" class="btn btn-outline-dark btn-contact">
              <i class="bi bi-telephone-fill me-2"></i> 0946702121
            </a>

            <a href="https://line.me/ti/p/59vDfPaWa7" target="_blank" class="btn btn-line btn-contact d-flex align-items-center justify-content-center">
              <i class="bi bi-line me-2"></i>
               LINE ID:peemai01_shop
            </a>

            <a href="https://m.me/mai.maimai.887680" target="_blank" class="btn btn-messenger btn-contact">
              <i class="bi bi-messenger me-2"></i> Messenger
            </a>

            <a href="https://www.facebook.com/share/1CPwdoZjTk/" target="_blank" class="btn btn-fb btn-contact">
              <i class="bi bi-facebook me-2"></i> ติดตามเราบน Facebook
            </a>
          </div>

          <div class="mt-4">
            <button class="btn btn-link text-decoration-none text-muted" onclick="window.close()">
              <i class="bi bi-arrow-left"></i> กลับสู่หน้าหลัก
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
